# tinyland-cleanup default configuration
# Copy to ~/.config/tinyland-cleanup/config.yaml and customize

# Polling interval in seconds
# CRITICAL: For CI runners with limited disk, use 30-60 seconds
poll_interval: 60

# Disk usage thresholds (percentage)
thresholds:
  warning: 80      # Level 1: Clear caches
  moderate: 85     # Level 2: Prune container images
  aggressive: 90   # Level 3: Prune volumes
  critical: 95     # Level 4: Emergency cleanup

# Target maximum used-space percentage after cleanup.
# Historical key name is target_free.
target_free: 70

# Daemon-level cleanup policy
policy:
  # Skip repeated non-critical daemon-triggered plugin cleanup within this window.
  # Explicit --level runs and critical pressure bypass cooldown.
  cooldown: 30m
  state_file: ~/.local/state/tinyland-cleanup/state.json

# Enable/disable specific cleanup plugins
enable:
  cache: true           # pip, npm, go, cargo, maven, gradle caches
  nix_gc: true          # nix-collect-garbage
  docker: true          # Docker image/volume/network/builder cleanup
  lima: true            # Lima VM cleanup (Darwin only)
  homebrew: true        # Homebrew cleanup (Darwin only)
  ios_simulator: true   # iOS Simulator cleanup (Darwin only)
  gitlab_runner: true   # GitLab runner cache cleanup
  github_runner: true   # GitHub Actions runner cleanup (Linux only)
  yum: true             # DNF/YUM package cache cleanup (Linux only)
  dev_artifacts: true   # Rebuildable workspace artifacts
  bazel: true           # Bazel output base and cache cleanup planning

# GitHub Actions runner settings (Linux only)
github_runner:
  home: "/home/github-runner"
  work_dir: ""  # Default: <home>/_work

# Monitored mount points (multi-volume support)
# When configured, all listed mounts are checked and the highest cleanup
# level triggers cleanup. Supports per-mount threshold overrides.
# If empty, falls back to monitoring $HOME (original behavior).
# monitored_mounts:
#   - path: "/"
#     label: "root"
#   - path: "/var/lib/docker"
#     label: "docker"
#     threshold_warning: 70
#     threshold_critical: 85
#   - path: "/nix"
#     label: "nix"
#     threshold_warning: 70
#     threshold_critical: 85

# Docker-specific settings
docker:
  # Socket path (auto-detected if not specified)
  # socket: /var/run/docker.sock  # Linux
  # socket: ~/.colima/default/docker.sock  # macOS Colima

  # Prune images older than this duration
  prune_images_age: "24h"

  # Don't prune images used by running containers
  protect_running_containers: true

# Podman-specific settings
podman:
  prune_images_age: "24h"
  protect_running_containers: true
  machine_names:
    - podman-machine-default

  # Critical-level BuildKit cache pruning targets the buildx builder cache
  # inside a running Podman VM. Guest-reported reclaim is recorded separately;
  # Darwin host reclaim is counted only from measured host free-space deltas.
  buildkit_prune: true
  buildkit_prune_keep_duration: 24h
  buildkit_prune_keep_storage_mb: 8192
  buildkit_prune_min_reclaim_gb: 4

  # Broad system prune with volumes can remove stopped-container state and
  # unused volumes. Keep it explicitly opt-in even under critical pressure.
  critical_system_prune: false

  clean_inside_vm: true
  trim_vm_disk: true

  # Offline VM disk compaction is disruptive and remains opt-in.
  compact_disk_offline: false
  compact_min_reclaim_gb: 8
  compact_require_no_active_containers: true
  compact_keep_backup_until_restart: true
  compact_provider_allowlist:
    - applehv
    - libkrun
    - qemu

  # Empty scratch dir keeps the compacted temp image beside the VM disk.
  # Configured scratch dirs may live on another filesystem; cross-device
  # replacement requires compact_keep_backup_until_restart.
  compact_scratch_dir: ""

  # Optional absolute qemu-img path when the daemon environment does not have
  # qemu-img on PATH.
  compact_qemu_img_path: ""

# Nix store and profile generation cleanup settings
nix:
  # Preserve rollback safety even under disk pressure
  min_user_generations: 5
  min_system_generations: 3
  # Filesystem used for plugin-isolated host free-space deltas around real Nix GC.
  host_measure_path: /nix/store

  # User generation deletion policy for moderate/aggressive and critical levels
  delete_generations_older_than: 14d
  critical_delete_generations_older_than: 3d

  # Store optimization can be disruptive; leave it explicitly opt-in
  allow_store_optimize: false

  # Avoid fighting active builds, Home Manager switches, and rebuilds
  skip_when_daemon_busy: true
  daemon_busy_backoff: 30m
  max_gc_duration: 20m
  # When dry-run GC reports no reclaimable space, show up to this many visible
  # GC roots so operators can identify what is pinning the store. Set 0 to
  # disable root attribution.
  root_attribution_limit: 20

# Bazel output base and cache review settings
bazel:
  roots:
    - ~/.cache/bazel
    # Darwin defaults also include /private/var/tmp/_bazel_$USER,
    # /var/tmp/_bazel_$USER, and /private/tmp from compiled defaults.
  workspace_roots:
    - ~/git
    - ~/src
    - ~/projects
  # Darwin default; Linux operators commonly use ~/.cache/bazelisk
  bazelisk_cache: ~/Library/Caches/bazelisk
  max_total_gb: 20
  keep_recent_output_bases: 5
  stale_after: 14d
  critical_stale_after: 3d
  protect_workspaces:
    - ~/git/lab
    - ~/git/GloriousFlywheel
  allow_stop_idle_servers: true
  allow_delete_active_output_bases: false

# Workspace development artifact settings
dev_artifacts:
  scan_paths:
    - ~/git
    - ~/src
    - ~/projects
  scan_max_duration: 30s
  scan_max_entries: 250000
  # Review-only: surface large top-level temp proof/output trees without
  # deleting them automatically. Darwin compiled defaults use /private/tmp.
  temp_artifacts: true
  temp_scan_paths:
    - /private/tmp
  temp_scan_max_roots: 128
  temp_artifact_min_mb: 256
  temp_artifact_stale_after: 6h
  node_modules: true
  python_venvs: true
  rust_targets: true
  zig_artifacts: true
  go_build_cache: true
  haskell_cache: true
  lmstudio_models: false
  # Review-only: report large local disk images and VM bundles, never auto-delete.
  large_local_artifacts: true
  large_local_artifact_min_mb: 1024
  protect_paths: []

# Darwin developer-cache review settings.
# Enforcement is opt-in; keep false until dry-run targets are reviewed.
darwin_dev_caches:
  enabled: true
  enforce: false
  max_total_gb: 15
  jetbrains:
    enabled: true
    max_gb: 8
    stale_after_days: 14
    keep_active_versions: true
  playwright:
    enabled: true
    keep_latest_per_family: true
  bazelisk:
    enabled: true
    keep_latest: 2
  pip:
    enabled: true
    stale_after_days: 14
  vscode:
    enabled: true
    max_gb: 4
    stale_after_days: 14
    keep_active_versions: true
  cursor:
    enabled: true
    max_gb: 4
    stale_after_days: 14
    keep_active_versions: true

# Lima VM settings (macOS)
lima:
  vm_names:
    - colima
    - unified

# Notification settings
notify:
  enabled: false
  # webhook_url: "https://hooks.slack.com/services/..."
