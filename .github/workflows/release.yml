name: Release

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Install Nix
        if: matrix.goos == 'linux'
        uses: DeterminateSystems/nix-installer-action@v22
      - name: Build
        run: |
          mkdir -p dist
          artifact="tinyland-cleanup-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${artifact}/tinyland-cleanup" \
            .
          cp README.md LICENSE "dist/${artifact}/"
          tar -C dist -czf "dist/${artifact}.tar.gz" "${artifact}"
        env:
          GOFLAGS: -mod=vendor
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: RPM
        if: matrix.goos == 'linux'
        run: |
          artifact="tinyland-cleanup-${GITHUB_REF_NAME}-${GOOS}-${GOARCH}"
          version="${GITHUB_REF_NAME#v}"
          case "${version}" in
            [0-9]*) ;;
            *) version="0.0.0" ;;
          esac
          NFPM_BINARY="dist/${artifact}/tinyland-cleanup" \
            NFPM_VERSION="${version}" \
            NFPM_RELEASE="${GITHUB_RUN_NUMBER}" \
            NFPM_ARCH="${GOARCH}" \
            nix shell nixpkgs#nfpm --command nfpm package --packager rpm --config packaging/nfpm.yaml --target dist/
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tinyland-cleanup-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.rpm

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: artifacts
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: sha256sum dist/*.tar.gz dist/*.rpm > dist/SHA256SUMS
      - name: Publish
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          files: |
            dist/*.tar.gz
            dist/*.rpm
            dist/SHA256SUMS
